name: daily-stock-analysis


x-common: &common
  image: zhulinsen/daily_stock_analysis:latest
  restart: unless-stopped
  env_file:
    - ../.env
  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../.env:/app/.env
    - ../strategies:/app/strategies:ro
  environment:
    - TZ=Asia/Shanghai
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  analyzer:
    <<: *common
    container_name: stock-analyzer

  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
